<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InvestoDeck</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
transition: background 0.4s, color 0.4s;
}

.light-mode{
background:#f5f6fa;
color:#111;
}

.dark-mode{
background:#0f172a;
color:#ffffff;
}

.dark-mode .card{
background:#1e293b;
color:white;
}

.toggle-btn{
cursor:pointer;
font-size:22px;
position:absolute;
right:25px;
top:20px;
}

</style>

</head>

<body class="light-mode">

<div class="container mt-5">

<div class="card shadow-lg p-4 position-relative">

<!-- Toggle Button -->
<div id="themeToggle" class="toggle-btn">
🌙
</div>

<div class="text-center mb-4">
<h1 style="color:#6A0DAD;font-weight:800;">
🚀 InvestoDeck
</h1>

<p style="color:#00BFFF;font-size:18px;">
Launch Investor-Ready Pitches
</p>
</div>


<form action="/submit" method="POST">

<div class="row mb-3">

<div class="col-md-6">
<label>Startup Name</label>
<input type="text" name="startup" class="form-control" required>
</div>

<div class="col-md-6">
<label>Tagline</label>
<input type="text" name="tagline" class="form-control" required>
</div>

</div>


<div class="mb-3">
<label>Problem Statement</label>
<textarea id="problemInput" name="problem" class="form-control" rows="3"></textarea>
</div>
<button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="rewriteProblem()">
✨ AI Rewrite
</button>
<div class="mb-3">
<label>Solution</label>
<textarea id="solutionInput" name="solution" class="form-control" rows="3"></textarea>
</div>
<button type="button" class="btn btn-outline-success btn-sm mt-2" onclick="rewriteSolution()">
✨ AI Rewrite
</button>
<div class="mb-3">
<label>Target Market</label>
<textarea name="market" class="form-control" rows="3"></textarea>
</div>

<div class="mb-3">
<label>Revenue Model</label>
<textarea name="revenue" class="form-control" rows="3"></textarea>
</div>

<div class="mb-3">
<label>Funding Requirement</label>
<textarea name="funding" class="form-control" rows="3"></textarea>
</div>


<h5 class="mt-4 mb-3">Financial Projections</h5>

<div class="row">

<div class="col-md-4">
<label>Year 1</label>
<input type="number" name="year1" class="form-control">
</div>

<div class="col-md-4">
<label>Year 2</label>
<input type="number" name="year2" class="form-control">
</div>

<div class="col-md-4">
<label>Year 3</label>
<input type="number" name="year3" class="form-control">
</div>

</div>


<div class="text-center mt-4">
<button class="btn btn-primary btn-lg">
Generate Pitch Deck
</button>
</div>

</form>

</div>
</div>


<script>

const toggle = document.getElementById("themeToggle");

toggle.addEventListener("click", () => {

const body = document.body;

if(body.classList.contains("light-mode")){
body.classList.remove("light-mode");
body.classList.add("dark-mode");
toggle.innerHTML = "☀️";
}else{
body.classList.remove("dark-mode");
body.classList.add("light-mode");
toggle.innerHTML = "🌙";
}

});
function rewriteProblem(){

let text = document.getElementById("problemInput").value;

if(text.length < 5){
alert("Please write the problem first.");
return;
}

let improved =
"Our platform addresses a critical challenge where " +
text +
". By leveraging technology and scalable solutions, we aim to create meaningful impact for affected users.";

document.getElementById("problemInput").value = improved;

}

function rewriteSolution(){

let text = document.getElementById("solutionInput").value;

if(text.length < 5){
alert("Please write the solution first.");
return;
}

let improved =
"Our solution introduces an innovative platform where " +
text +
". This approach enhances efficiency, improves accessibility, and creates sustainable value for users.";

document.getElementById("solutionInput").value = improved;

}
</script>

</body>
</html>
